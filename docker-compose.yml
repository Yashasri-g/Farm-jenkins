version: "3.9"
services:
  backend:
    image: 7396444674/backend:${TAG}
    container_name: farm-blog-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/blog_app}
    depends_on:
      - mongodb
    restart: unless-stopped
  frontend:
    image: 7396444674/frontend:${TAG}
    container_name: farm-blog-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
  mongodb:
    image: mongo:7
    container_name: farm-blog-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
volumes:
  mongo_data:
