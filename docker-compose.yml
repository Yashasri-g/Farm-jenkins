services:
  backend:
    image: docker.io/yashasri1209/farm-blog-backend:latest
    container_name: farm-blog-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/blog_app}
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    image: docker.io/yashasri1209/farm-blog-frontend:latest
    container_name: farm-blog-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: farm-blog-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
